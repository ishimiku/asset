<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hiyori Roi - Lip Sync Project</title>
    <style>
        body { 
    text-align: center; 
    padding-top: 50px; 
    background: #f0f0f0; 
    font-family: sans-serif;
}

#target-image { 
    width: 250px; /* 画像のサイズ */
    height: auto;
    margin-bottom: 30px;
    transition: transform 0.05s ease; /* 反応の速さ */
    display: block;
    margin-left: auto;
    margin-right: auto;
}

.controls {
    margin-top: 20px;
}

button { 
    padding: 15px 30px; 
    font-size: 18px; 
    cursor: pointer; 
    border-radius: 8px;
    border: none;
    background: #007aff;
    color: white;
}

button:disabled {
    background: #ccc;
}
        #container { text-align: center; margin-top: 50px; }
        img { width: 300px; transition: transform 0.1s; }
        /* ...などなど */
    </style>
</head>
<body>

    <div id="container">
    <img id="target-image" src="https://raw.githubusercontent.com/ishimiku/asset/main/IMG_7042.jpeg">
</div>

<div class="controls">
    <button id="start-btn">スタート</button>
    <button id="stop-btn">ストップ</button>
</div>
    <div id="container">
        <img id="target-image" src="あなたの画像のURL">
    </div>
    <div class="controls">
        <button id="start-btn">スタート</button>
        <button id="stop-btn">ストップ</button>
    </div>

    <script>
        let audioStream = null;
let animationId = null; // アニメーションを止めるための番号

const startBtn = document.getElementById('start-btn');
const stopBtn = document.getElementById('stop-btn');
const targetImg = document.getElementById('target-image');

// スタート処理
startBtn.addEventListener('click', async () => {
    try {
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        audioStream = await navigator.mediaDevices.getUserMedia({ audio: true });
        
        const source = audioCtx.createMediaStreamSource(audioStream);
        const analyser = audioCtx.createAnalyser();
        analyser.fftSize = 256;
        source.connect(analyser);

        const dataArray = new Uint8Array(analyser.frequencyBinCount);

        function update() {
            analyser.getByteFrequencyData(dataArray);
            let sum = 0;
            for (let i = 0; i < dataArray.length; i++) {
                sum += dataArray[i];
            }
            let average = sum / dataArray.length;
            let scale = 1 + (average / 30); 
            targetImg.style.transform = `scale(${scale})`;

            // 繰り返し命令を保存しておく
            animationId = requestAnimationFrame(update);
        }

        update();
        startBtn.disabled = true;
        console.log("マイク開始しました");
        
    } catch (err) {
        alert("マイクが使えません: " + err);
    }
});

// ストップ処理
stopBtn.addEventListener('click', () => {
    // 1. マイクを物理的に止める
    if (audioStream) {
        audioStream.getTracks().forEach(track => track.stop());
        audioStream = null;
    }
    
    // 2. 画面の更新（アニメーション）を止める
    if (animationId) {
        cancelAnimationFrame(animationId);
    }
    
    // 3. 見た目をリセット
    targetImg.style.transform = "scale(1)";
    startBtn.disabled = false;
    
    console.log("ストップボタンが押されました");
    alert("マイクを停止しました"); // 反応したか確認するためのアラート
});
        // let audioStream = ...
    </script>
</body>
</html>
